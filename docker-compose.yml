services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pi_planning
      POSTGRES_USER: ${DB_USER:-planning}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-planning}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-planning}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DB_USER:-planning}:${DB_PASSWORD:-planning}@db:5432/pi_planning
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
