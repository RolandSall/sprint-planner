services:
  pi-planning:
    image: rolandsall24/pi-planning:latest
    ports:
      - "4200:4200"
    environment:
      EVENT_STORE_MODE: ${EVENT_STORE_MODE:-audit}
      MEDIATOR_FLOW_ENABLED: ${MEDIATOR_FLOW_ENABLED:-true}
      MEDIATOR_FLOW_URL: ${MEDIATOR_FLOW_URL:-http://mediatorflow:4800}
      MEDIATOR_FLOW_SERVICE_NAME: ${MEDIATOR_FLOW_SERVICE_NAME:-pi-planning}
    volumes:
      - pi_data:/var/lib/postgresql/data

  mediatorflow:
    image: rolandsall24/mediatorflow:latest
    ports:
      - "4800:4800"
    volumes:
      - mediatorflow_data:/var/lib/postgresql/data

volumes:
  pi_data:
  mediatorflow_data:
